name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bundle flags
        run: |
          if [ -d flags ] && find flags -name '*.svg' -print -quit | grep -q .; then
            tar -czf flags.tar.gz flags/
            echo "flags.tar.gz created"
          else
            echo "no SVG flags present; skipping flags.tar.gz"
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            data/codes.json
            data/aliases.json
            data/flags-manifest.json
            data/unresolved.json
            flags.tar.gz
          fail_on_unmatched_files: false
          generate_release_notes: true
