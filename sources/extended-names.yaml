# Curated names + citations for codes that appear in the Sailwave directory
# but are absent from RRS and World Sailing (spec §5.4).
#
# Three sections:
#   extended:    currently-existing country / territory / sub-national entity
#   historical:  no longer in use; kept for legacy event data
#   unresolved:  explicitly excluded with a reason
#
# Any Sailwave-only code that is NOT listed in any section is also written to
# data/unresolved.json by the merge step, with reason "needs research". That
# leaves a visible audit ledger without guessing at names.
#
# Each curated entry carries a citation URL — typically a Wikipedia article
# that displays the flag in question — so a reviewer can verify it.
# `commons` overrides the default "File:Flag of {name}.svg" pattern; the
# flag resolver also reads sources/flag-overrides.yaml.

